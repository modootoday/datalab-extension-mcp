# Publish @modootoday/datalab-extension-mcp to npm.
#
# Generated by the source repo — edits here are overwritten on the next release.
#
# Runs here rather than in the source repo so npm provenance can attest: it
# checks that package.json's `repository` matches the repo publishing from.
#
# Auth is OIDC (trusted publishing) — no npm token anywhere. npm matches the
# short-lived token this job requests against a trusted publisher registered on
# the package, which names this repo AND this filename. Renaming this file
# breaks publishing until the registration is updated to match.
#
# Note what that trades: with no credential to steal, repository write access
# IS publish access. That is the deal trusted publishing makes.
name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  # Required for provenance.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Node 22 bundles npm 10.9.x; OIDC needs >= 11.5.1. Without this the
      # publish falls back to looking for a token, finds none, and 404s on a
      # scoped package — an error that says nothing about the real cause.
      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - run: npm install
      # Build before test: mcp imports the core through its `main`
      # (mcp-core/dist), so a test-first order runs against a module that does
      # not exist yet.
      - run: npm run build
      - run: npm test --workspaces
      - name: Publish
        working-directory: mcp
        # The publish manifest differs from the one used to build here: no
        # devDependencies, and no dependency on the core, which tsup has already
        # inlined into dist.
        # No NODE_AUTH_TOKEN: auth comes from the OIDC token this job requests
        # via id-token: write. Provenance is implied by trusted publishing, but
        # stays explicit so a config drift fails loudly instead of quietly
        # publishing unattested.
        run: |
          cp ../publish/package.json ./package.json
          npm publish --provenance --access public
